<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书 · 点赞收藏管理 | XHS Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* CSS Variables for Themes */
    :root {
      /* Light Theme (default) */
      --bg: #f8fafc;
      --text: #0f172a;
      --header-bg: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%);
      --header-border: rgba(0, 0, 0, .06);
      --tab-hover-bg: rgba(0, 0, 0, .04);
      --tab-text: #64748b;
      --tab-hover-text: #0f172a;
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
      --input-text: #0f172a;
      --input-placeholder: #94a3b8;
      --btn-ghost-bg: #ffffff;
      --btn-ghost-border: #cbd5e1;
      --btn-ghost-hover-bg: #f1f5f9;
      --btn-ghost-text: #475569;
      --btn-ghost-hover-text: #0f172a;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --card-hover-border: rgba(168, 85, 247, .5);
      --card-hover-shadow: 0 8px 30px rgba(0, 0, 0, .06);
      --card-meta: #64748b;
      --card-id: #94a3b8;
      --overlay-bg: rgba(255, 255, 255, .8);
      --progress-bg: #ffffff;
      --progress-border: #e2e8f0;
      --progress-bar-bg: rgba(0, 0, 0, .08);
      --progress-log-bg: #f1f5f9;
      --btn-check-bg: rgba(255, 255, 255, .8);
      --btn-check-border: rgba(0, 0, 0, .2);
      --empty-icon: #cbd5e1;
      --empty-text: #64748b;
      --opt-bg: #ffffff;
      --header-controls-bg: rgba(255, 255, 255, .6);
    }

    [data-theme="dark"] {
      --bg: #0f0f13;
      --text: #e4e4e7;
      --header-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --header-border: rgba(255, 255, 255, .06);
      --tab-hover-bg: rgba(255, 255, 255, .03);
      --tab-text: #71717a;
      --tab-hover-text: #d4d4d8;
      --input-bg: rgba(255, 255, 255, .05);
      --input-border: rgba(255, 255, 255, .08);
      --input-text: #e4e4e7;
      --input-placeholder: #52525b;
      --btn-ghost-bg: rgba(255, 255, 255, .05);
      --btn-ghost-border: rgba(255, 255, 255, .08);
      --btn-ghost-hover-bg: rgba(255, 255, 255, .1);
      --btn-ghost-text: #a1a1aa;
      --btn-ghost-hover-text: #e4e4e7;
      --card-bg: rgba(255, 255, 255, .03);
      --card-border: rgba(255, 255, 255, .06);
      --card-hover-border: rgba(192, 132, 252, .5);
      --card-hover-shadow: 0 8px 30px rgba(0, 0, 0, .3);
      --card-meta: #71717a;
      --card-id: #52525b;
      --overlay-bg: rgba(0, 0, 0, .7);
      --progress-bg: #1a1a2e;
      --progress-border: rgba(255, 255, 255, .1);
      --progress-bar-bg: rgba(255, 255, 255, .08);
      --progress-log-bg: rgba(0, 0, 0, .3);
      --btn-check-bg: rgba(0, 0, 0, .5);
      --btn-check-border: rgba(255, 255, 255, .3);
      --empty-icon: #52525b;
      --empty-text: #71717a;
      --opt-bg: #1a1a2e;
      --header-controls-bg: rgba(0, 0, 0, .2);
    }

    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    /* ===== HEADER ===== */
    .header {
      background: var(--header-bg);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--header-border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b6b, #ee5a9d, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--tab-text);
      background: var(--header-controls-bg);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .header .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s infinite;
    }

    .header .status .dot.ok {
      background: #22c55e;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ctrl-group {
      display: flex;
      background: var(--header-controls-bg);
      border-radius: 8px;
      padding: 4px;
      gap: 2px;
    }

    .ctrl-btn {
      background: transparent;
      border: none;
      padding: 6px 10px;
      color: var(--tab-text);
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover {
      color: var(--text);
      background: var(--tab-hover-bg);
    }

    .ctrl-btn.active {
      background: var(--btn-ghost-bg);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 40px 0;
      border-bottom: 1px solid var(--header-border);
    }

    .tab {
      padding: 12px 28px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px 10px 0 0;
      background: transparent;
      color: var(--tab-text);
      border: 1px solid transparent;
      border-bottom: none;
      transition: all .25s;
    }

    .tab:hover {
      color: var(--tab-hover-text);
      background: var(--tab-hover-bg);
    }

    .tab.active {
      color: #f0abfc;
      background: rgba(192, 132, 252, .08);
      border-color: rgba(192, 132, 252, .15);
    }

    /* ===== TOOLBAR ===== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 40px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--input-text);
      font-size: 14px;
      outline: none;
      transition: border .2s;
    }

    .search-box input:focus {
      border-color: rgba(192, 132, 252, .5);
    }

    .search-box input::placeholder {
      color: var(--input-placeholder);
    }

    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }

    .filter-select {
      padding: 10px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--input-text);
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .filter-select option {
      background: var(--opt-bg);
      color: var(--text);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #c084fc, #a855f7);
      color: #fff;
      box-shadow: 0 2px 12px rgba(168, 85, 247, .3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(168, 85, 247, .4);
    }

    .btn-danger {
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      color: #fff;
      box-shadow: 0 2px 12px rgba(244, 63, 94, .3);
    }

    .btn-danger:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(244, 63, 94, .4);
    }

    .btn-ghost {
      background: var(--btn-ghost-bg);
      color: var(--btn-ghost-text);
      border: 1px solid var(--btn-ghost-border);
    }

    .btn-ghost:hover {
      background: var(--btn-ghost-hover-bg);
      color: var(--btn-ghost-hover-text);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ===== STATS BAR ===== */
    .stats {
      padding: 0 40px 12px;
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: var(--tab-text);
    }

    .stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stats .num {
      color: #c084fc;
      font-weight: 600;
    }

    #content {
      flex: 1;
      overflow-y: auto;
    }

    /* ===== NOTE GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 0 40px 40px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      transition: all .25s;
      position: relative;
    }

    .card:hover {
      border-color: var(--card-hover-border);
      transform: translateY(-2px);
      box-shadow: var(--card-hover-shadow);
    }

    .card.selected {
      border-color: rgba(168, 85, 247, .5);
      background: rgba(168, 85, 247, .04);
      box-shadow: 0 0 0 1px rgba(168, 85, 247, .3);
    }

    .card-cover {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #1a1a2e;
      display: block;
    }

    .card-body {
      padding: 14px 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
      min-height: 40px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--card-meta);
    }

    .card-author {
      display: flex;
      align-items: center;
      gap: 4px;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-check {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: var(--btn-check-bg);
      border: 2px solid var(--btn-check-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .card-check:hover {
      border-color: rgba(192, 132, 252, .6);
    }

    .card.selected .card-check {
      background: linear-gradient(135deg, #a855f7, #c084fc);
      border-color: transparent;
    }

    .card.selected .card-check::after {
      content: '✓';
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .card-id {
      font-family: monospace;
      font-size: 11px;
      color: var(--card-id);
    }

    /* ===== PROGRESS OVERLAY ===== */
    .progress-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .progress-overlay.show {
      display: flex;
    }

    .progress-box {
      background: var(--progress-bg);
      border: 1px solid var(--progress-border);
      border-radius: 20px;
      padding: 40px;
      width: 480px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .2);
    }

    .progress-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: var(--progress-bar-bg);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      transition: width .3s;
      width: 0%;
    }

    .progress-nums {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 14px;
      margin-bottom: 16px;
      color: var(--text);
    }

    .progress-nums .s {
      color: #22c55e;
    }

    .progress-nums .f {
      color: #ef4444;
    }

    .progress-log {
      max-height: 160px;
      overflow-y: auto;
      text-align: left;
      font-size: 12px;
      font-family: monospace;
      color: var(--tab-text);
      background: var(--progress-log-bg);
      border-radius: 10px;
      padding: 12px;
      margin-top: 12px;
    }

    .progress-log div {
      padding: 2px 0;
    }

    /* ===== EMPTY STATE ===== */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--empty-text);
    }

    .empty .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .empty p {
      font-size: 15px;
    }

    /* ===== LOADING ===== */
    .loading {
      text-align: center;
      padding: 60px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--header-border);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(128, 128, 128, .3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(128, 128, 128, .5);
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1 id="i18n-title">📕 小红书 · 点赞收藏管理</h1>
      <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">检查连接中...</span>
      </div>
    </div>
    <div class="header-controls">
      <!-- Theme Switch -->
      <div class="ctrl-group">
        <button class="ctrl-btn" onclick="setTheme('light')" id="btn-theme-light">🌞</button>
        <button class="ctrl-btn active" onclick="setTheme('dark')" id="btn-theme-dark">🌙</button>
        <button class="ctrl-btn" onclick="setTheme('system')" id="btn-theme-system">💻</button>
      </div>
      <!-- Language Switch -->
      <div class="ctrl-group">
        <button class="ctrl-btn active" onclick="setLang('zh')" id="btn-lang-zh">中</button>
        <button class="ctrl-btn" onclick="setLang('en')" id="btn-lang-en">EN</button>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="likes" onclick="switchTab('likes')" id="i18n-tab-likes">❤️ 点赞管理</div>
    <div class="tab" data-tab="collects" onclick="switchTab('collects')" id="i18n-tab-collects">⭐ 收藏管理</div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索标题、博主名或帖子ID..." oninput="applyFilters()">
    </div>
    <select class="filter-select" id="authorFilter" onchange="applyFilters()">
      <option value="">全部博主</option>
    </select>
    <button class="btn btn-ghost" onclick="selectAll()" id="i18n-btn-all">全选</button>
    <button class="btn btn-ghost" onclick="deselectAll()" id="i18n-btn-none">取消全选</button>
    <button class="btn btn-ghost" onclick="invertSelection()" id="i18n-btn-invert">反选</button>
    <button class="btn btn-primary" id="loadBtn" onclick="loadNotes()">📥 <span id="i18n-btn-load">加载列表</span></button>
    <button class="btn btn-danger" id="actionBtn" onclick="executeAction()" disabled>🗑️ <span id="i18n-btn-action">取消已选
        (0)</span></button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <span><span id="i18n-stat-total">总计</span> <b class="num" id="totalCount">0</b></span>
    <span><span id="i18n-stat-filter">筛选结果</span> <b class="num" id="filteredCount">0</b></span>
    <span><span id="i18n-stat-sel">已选择</span> <b class="num" id="selectedCount">0</b></span>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div class="empty">
      <div class="icon">📋</div>
      <p id="i18n-msg-empty">点击「加载列表」获取你的数据</p>
    </div>
  </div>

  <!-- PROGRESS OVERLAY -->
  <div class="progress-overlay" id="progressOverlay">
    <div class="progress-box">
      <div class="progress-title" id="progressTitle">正在执行...</div>
      <div class="progress-notice" id="i18n-prog-notice"
        style="font-size:12px; color:var(--card-meta); margin-bottom:16px;">
        🛡️ 已启用智能防风控保护: 每步操作随机模拟真人停顿 (2.5s - 5s)
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="progress-nums">
        <span><span id="i18n-prog-rate">进度</span> <b id="progressDone">0</b> / <b id="progressTotal">0</b></span>
        <span class="s"><span id="i18n-prog-succ">成功</span> <b id="progressSuccess">0</b></span>
        <span class="f"><span id="i18n-prog-fail">失败</span> <b id="progressFailed">0</b></span>
      </div>
      <div class="progress-log" id="progressLog"></div>
      <button class="btn btn-ghost" id="progressClose" onclick="closeProgress()"
        style="margin-top:16px;display:none;margin-left:auto;margin-right:auto;">
        <span id="i18n-btn-close">关闭</span>
      </button>
    </div>
  </div>

  <script>
    // ====== I18N DICT ======
    const i18n = {
      zh: {
        title: "📕 小红书 · 点赞收藏管理",
        checking: "检查连接中...",
        conn_ok: "已连接 · ",

        tab_likes: "❤️ 点赞管理",
        tab_collects: "⭐ 收藏管理",
        search_ph: "搜索标题、博主名或帖子ID...",
        all_authors: "全部博主",
        btn_all: "全选",
        btn_none: "取消全选",
        btn_invert: "反选",
        btn_load: "加载列表",
        btn_loading: "加载中...",
        btn_action_like: "取消点赞",
        btn_action_coll: "取消收藏",
        stat_total: "总计",
        stat_filter: "筛选结果",
        stat_sel: "已选择",
        msg_empty_init: "点击「加载列表」获取你的{tab}数据",
        msg_empty_none: "没有找到匹配的内容",
        msg_loading: "正在从小红书拉取数据...",
        msg_net_err: "网络错误: ",
        author: "👤 ",
        prog_exec: "正在执行...",
        prog_notice: "🛡️ 已启用智能防风控保护: 每步操作随机模拟真人停顿 (2.5s - 5s)",
        prog_rate: "进度",
        prog_succ: "成功",
        prog_fail: "失败",
        btn_close: "关闭",
        confirm_act: "确认对 {num} 篇笔记执行「{act}」操作？\n\n⚠️ 此操作不可逆！",
        act_done: "{act}完成！"
      },
      en: {
        title: "📕 XHS Likes & Collects",
        checking: "Checking connection...",
        conn_ok: "Connected · ",
        conn_err: "Connection failed",
        tab_likes: "❤️ My Likes",
        tab_collects: "⭐ My Collects",
        search_ph: "Search title, author or Note ID...",
        all_authors: "All Authors",
        btn_all: "Select All",
        btn_none: "Deselect All",
        btn_invert: "Invert",
        btn_load: "Load Data",
        btn_loading: "Loading...",
        btn_action_like: "Unlike",
        btn_action_coll: "Uncollect",
        stat_total: "Total",
        stat_filter: "Filtered",
        stat_sel: "Selected",
        msg_empty_init: "Click 'Load Data' to fetch your {tab}",
        msg_empty_none: "No matching results found.",
        msg_loading: "Fetching data from XHS...",
        msg_net_err: "Network error: ",
        author: "👤 ",
        prog_exec: "Executing...",
        prog_notice: "🛡️ Anti-ban enabled: Simulating random human delay (2.5s - 5s) between actions.",
        prog_rate: "Progress",
        prog_succ: "Success",
        prog_fail: "Failed",
        btn_close: "Close",
        confirm_act: "Are you sure you want to {act} {num} notes?\n\n⚠️ This action cannot be undone!",
        act_done: "{act} Completed!"
      }
    };

    let currentTab = 'likes';
    let allNotes = [];
    let filteredNotes = [];
    let selectedIds = new Set();

    let currLang = localStorage.getItem('xhs_lang') || 'zh';
    let currTheme = localStorage.getItem('xhs_theme') || 'dark';
    let g_userId = '';

    // ====== INIT THEME & LANG ======
    function setTheme(theme) {
      currTheme = theme;
      localStorage.setItem('xhs_theme', theme);
      const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (theme === 'system') {
        document.documentElement.setAttribute('data-theme', sysDark ? 'dark' : 'light');
      } else {
        document.documentElement.setAttribute('data-theme', theme);
      }

      document.getElementById('btn-theme-light').classList.toggle('active', theme === 'light');
      document.getElementById('btn-theme-dark').classList.toggle('active', theme === 'dark');
      document.getElementById('btn-theme-system').classList.toggle('active', theme === 'system');
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (currTheme === 'system') setTheme('system');
    });

    function setLang(lang) {
      currLang = lang;
      localStorage.setItem('xhs_lang', lang);

      document.getElementById('btn-lang-zh').classList.toggle('active', lang === 'zh');
      document.getElementById('btn-lang-en').classList.toggle('active', lang === 'en');

      updateTexts();
      if (allNotes.length === 0) {
        showEmptyInit();
      }
      buildAuthorFilter(); // update default option text
      updateActionBtn();
    }

    function t(key, vars = {}) {
      let str = i18n[currLang][key] || key;
      for (const [k, v] of Object.entries(vars)) {
        str = str.replace(`{${k}}`, v);
      }
      return str;
    }

    function updateTexts() {
      document.getElementById('i18n-title').textContent = t('title');
      document.getElementById('i18n-tab-likes').textContent = t('tab_likes');
      document.getElementById('i18n-tab-collects').textContent = t('tab_collects');
      document.getElementById('searchInput').placeholder = t('search_ph');
      document.getElementById('i18n-btn-all').textContent = t('btn_all');
      document.getElementById('i18n-btn-none').textContent = t('btn_none');
      document.getElementById('i18n-btn-invert').textContent = t('btn_invert');

      const loadBtnSpan = document.getElementById('i18n-btn-load');
      if (loadBtnSpan) loadBtnSpan.textContent = document.getElementById('loadBtn').disabled ? t('btn_loading') : t('btn_load');

      document.getElementById('i18n-stat-total').textContent = t('stat_total');
      document.getElementById('i18n-stat-filter').textContent = t('stat_filter');
      document.getElementById('i18n-stat-sel').textContent = t('stat_sel');
      document.getElementById('i18n-prog-rate').textContent = t('prog_rate');
      const progNoticeSpan = document.getElementById('i18n-prog-notice');
      if (progNoticeSpan) progNoticeSpan.textContent = t('prog_notice');
      document.getElementById('i18n-prog-succ').textContent = t('prog_succ');
      document.getElementById('i18n-prog-fail').textContent = t('prog_fail');
      document.getElementById('i18n-btn-close').textContent = t('btn_close');

      const txt = document.getElementById('statusText');
      if (txt.textContent.includes('已连接') || txt.textContent.includes('Connected')) {
        txt.textContent = t('conn_ok') + g_userId;
      } else if (txt.textContent.includes('检查') || txt.textContent.includes('Checking')) {
        txt.textContent = t('checking');
      } else {
        // keep api error msg or set to conn_err
        if (txt.textContent === i18n.zh.conn_err || txt.textContent === i18n.en.conn_err) {
          txt.textContent = t('conn_err');
        }
      }
    }

    function showEmptyInit() {
      const tabName = currentTab === 'likes' ? (currLang === 'zh' ? '点赞' : 'likes ') : (currLang === 'zh' ? '收藏' : 'collected ');
      document.getElementById('content').innerHTML = `
    <div class="empty"><div class="icon">📋</div>
    <p>${t('msg_empty_init', { tab: tabName })}</p></div>`;
    }

    // ====== TAB ======
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      allNotes = [];
      filteredNotes = [];
      selectedIds.clear();
      showEmptyInit();
      updateCounts();
      updateActionBtn();
    }

    // ====== LOAD ======
    async function loadNotes() {
      const btn = document.getElementById('loadBtn');
      btn.disabled = true;
      document.getElementById('i18n-btn-load').textContent = t('btn_loading');
      document.getElementById('content').innerHTML = `
    <div class="loading"><div class="spinner"></div><p id="loadingMsg" style="color:var(--tab-text)">${t('msg_loading')}</p></div>`;

      const endpoint = currentTab === 'likes' ? '/api/load-likes' : '/api/load-collects';
      try {
        const res = await fetch(endpoint, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) {
          document.getElementById('content').innerHTML = `
        <div class="empty"><div class="icon">❌</div><p>${data.msg}</p></div>`;
          btn.disabled = false;
          document.getElementById('i18n-btn-load').textContent = t('btn_load');
          return;
        }

        const poll = setInterval(async () => {
          try {
            const stRes = await fetch('/api/load-status');
            const st = await stRes.json();
            
            const msgEl = document.getElementById('loadingMsg');
            if (msgEl) {
                // 动态更新已拉取的数量，即变相的拉取进度条
                msgEl.innerHTML = `${t('msg_loading')} <br><br>📦 已成功拉取 <b>${st.count}</b> 篇笔记...`;
            }

            if (!st.running) {
              clearInterval(poll);
              if (st.error) {
                document.getElementById('content').innerHTML = `
                  <div class="empty"><div class="icon">❌</div><p>${st.error}</p></div>`;
              } else {
                allNotes = st.notes || [];
                selectedIds.clear();
                buildAuthorFilter();
                applyFilters();
              }
              btn.disabled = false;
              document.getElementById('i18n-btn-load').textContent = t('btn_load');
            }
          } catch(e) {}
        }, 800);

      } catch (e) {
        document.getElementById('content').innerHTML = `
      <div class="empty"><div class="icon">❌</div><p>${t('msg_net_err')}${e.message}</p></div>`;
        btn.disabled = false;
        document.getElementById('i18n-btn-load').textContent = t('btn_load');
      }
    }

    // ====== FILTERS ======
    function buildAuthorFilter() {
      const authors = {};
      allNotes.forEach(n => { authors[n.author] = (authors[n.author] || 0) + 1; });
      const select = document.getElementById('authorFilter');
      select.innerHTML = `<option value="">${t('all_authors')}</option>`;
      Object.entries(authors)
        .sort((a, b) => b[1] - a[1])
        .forEach(([name, count]) => {
          select.innerHTML += `<option value="${name}">${name} (${count})</option>`;
        });
    }

    function applyFilters() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const author = document.getElementById('authorFilter').value;

      filteredNotes = allNotes.filter(n => {
        if (author && n.author !== author) return false;
        if (q) {
          const haystack = `${n.title} ${n.author} ${n.note_id}`.toLowerCase();
          return haystack.includes(q);
        }
        return true;
      });

      renderGrid();
      updateCounts();
    }

    // ====== RENDER ======
    function renderGrid() {
      if (filteredNotes.length === 0) {
        document.getElementById('content').innerHTML = `
      <div class="empty"><div class="icon">🔍</div><p>${t('msg_empty_none')}</p></div>`;
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'grid';

      filteredNotes.forEach(n => {
        const isSelected = selectedIds.has(n.note_id);
        const card = document.createElement('div');
        card.className = `card${isSelected ? ' selected' : ''}`;
        card.dataset.id = n.note_id;

        const coverUrl = n.cover ? `https://sns-webpic-qc.xhscdn.com/${n.cover}?imageView2/2/w/400` : '';
        card.innerHTML = `
      <div class="card-check" onclick="toggleSelect(event,'${n.note_id}')"></div>
      ${coverUrl ? `<img class="card-cover" src="${coverUrl}" loading="lazy" onerror="this.style.display='none'">` : '<div class="card-cover" style="background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:32px">📝</div>'}
      <div class="card-body">
        <div class="card-title">${escHtml(n.title)}</div>
        <div class="card-meta">
          <span class="card-author">${t('author')}${escHtml(n.author)}</span>
          <span class="card-id">${n.note_id.slice(0, 8)}...</span>
        </div>
      </div>`;
        card.addEventListener('click', (e) => {
          if (!e.target.closest('.card-check')) toggleSelect(e, n.note_id);
        });
        grid.appendChild(card);
      });

      document.getElementById('content').innerHTML = '';
      document.getElementById('content').appendChild(grid);
    }

    // ====== SELECTION ======
    function toggleSelect(e, id) {
      e.stopPropagation();
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (card) card.classList.toggle('selected', selectedIds.has(id));
      updateCounts();
      updateActionBtn();
    }

    function selectAll() {
      filteredNotes.forEach(n => selectedIds.add(n.note_id));
      renderGrid(); updateCounts(); updateActionBtn();
    }

    function deselectAll() {
      selectedIds.clear();
      renderGrid(); updateCounts(); updateActionBtn();
    }

    function invertSelection() {
      filteredNotes.forEach(n => {
        if (selectedIds.has(n.note_id)) selectedIds.delete(n.note_id);
        else selectedIds.add(n.note_id);
      });
      renderGrid(); updateCounts(); updateActionBtn();
    }

    // ====== COUNTS ======
    function updateCounts() {
      document.getElementById('totalCount').textContent = allNotes.length;
      document.getElementById('filteredCount').textContent = filteredNotes.length;
      document.getElementById('selectedCount').textContent = selectedIds.size;
    }

    function updateActionBtn() {
      const btnLabel = document.getElementById('i18n-btn-action');
      const actionName = currentTab === 'likes' ? t('btn_action_like') : t('btn_action_coll');
      btnLabel.textContent = `${actionName} (${selectedIds.size})`;
      document.getElementById('actionBtn').disabled = selectedIds.size === 0;
    }

    // ====== EXECUTE ======
    async function executeAction() {
      if (selectedIds.size === 0) return;
      const actName = currentTab === 'likes' ? t('btn_action_like') : t('btn_action_coll');
      const confirmMsg = t('confirm_act', { num: selectedIds.size, act: actName });

      if (!confirm(confirmMsg)) return;

      const endpoint = currentTab === 'likes' ? '/api/unlike' : '/api/uncollect';
      const ids = Array.from(selectedIds);

      // Show progress
      document.getElementById('progressOverlay').classList.add('show');
      document.getElementById('progressTitle').textContent = t('prog_exec');
      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('progressDone').textContent = '0';
      document.getElementById('progressTotal').textContent = ids.length;
      document.getElementById('progressSuccess').textContent = '0';
      document.getElementById('progressFailed').textContent = '0';
      document.getElementById('progressLog').innerHTML = '';
      document.getElementById('progressClose').style.display = 'none';

      await fetch(endpoint, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note_ids: ids })
      });

      // Poll progress
      const poll = setInterval(async () => {
        const res = await fetch('/api/task-status');
        const st = await res.json();
        const pct = st.total > 0 ? (st.done / st.total * 100) : 0;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressDone').textContent = st.done;
        document.getElementById('progressTotal').textContent = st.total;
        document.getElementById('progressSuccess').textContent = st.success;
        document.getElementById('progressFailed').textContent = st.failed;
        const logEl = document.getElementById('progressLog');
        logEl.innerHTML = st.log.map(l => `<div>${l}</div>`).join('');
        logEl.scrollTop = logEl.scrollHeight;

        if (!st.running) {
          clearInterval(poll);
          document.getElementById('progressTitle').textContent = t('act_done', { act: actName });
          document.getElementById('progressClose').style.display = 'inline-flex';

          window.lastSuccessIds = st.log
            .filter(l => l.startsWith('✅'))
            .map(l => l.replace('✅ ', '').trim());
        }
      }, 1000);
    }

    function closeProgress() {
      document.getElementById('progressOverlay').classList.remove('show');

      // 从本地全量数据中，仅仅删除掉操作成功的帖子，避免重新发起费时的API拉取
      const successIds = window.lastSuccessIds || [];
      if (successIds.length > 0) {
        allNotes = allNotes.filter(n => !successIds.includes(n.note_id));
      }

      selectedIds.clear();
      window.lastSuccessIds = [];

      // 重新渲染UI，更新全选数字和右上角的按钮
      applyFilters();
      updateActionBtn();
    }

    // ====== UTILS ======
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ====== LOGIN HOOK ======
    function showLoginPrompt() {
      document.getElementById('content').innerHTML = `
        <div class="empty">
          <div class="icon" style="font-size:56px;color:#a855f7;opacity:1;margin-bottom:20px">📱</div>
          <p style="margin-bottom:24px;color:var(--text);font-size:16px;">
            <b>探测不到有效的登陆凭证</b><br><br>
            <span style="font-size:13px;color:var(--card-meta)">您本地的 Cookie 可能已过期或从未配置。</span>
          </p>
          <button class="btn btn-primary" style="margin:0 auto;padding:12px 28px;font-size:15px;box-shadow:0 6px 20px rgba(192,132,252,.4);" onclick="triggerAutoLogin()">
            ✨ 立即一键自动扫码登录
          </button>
        </div>`;
    }

    async function triggerAutoLogin() {
      // 第一步：唤起 Playwright 登录窗口
      document.getElementById('content').innerHTML = `
        <div class="empty" style="padding-top:60px">
          <div class="spinner"></div>
          <p style="margin-top:16px;color:var(--text);font-size:15px;font-weight:600">第 1 步：请在弹出的浏览器窗口中完成登录</p>
          <p style="font-size:13px;color:var(--card-meta);margin-top:12px;line-height:1.8">
            即将弹出小红书登录页面，请在其中完成扫码或验证码登录。<br>
            登录成功后，<b>请手动关闭该浏览器窗口</b>，然后点击下方按钮继续。
          </p>
          <button class="btn btn-primary" style="margin:24px auto 0;padding:12px 28px;font-size:15px;" onclick="verifyAndProceed()">
            ✅ 我已登录并关闭了窗口，验证连接
          </button>
        </div>`;
        
      await fetch('/api/trigger-login', { method: 'POST' });
    }

    async function verifyAndProceed() {
      // 第二步：验证 Cookie 是否已写入成功
      document.getElementById('content').innerHTML = `
        <div class="loading"><div class="spinner"></div><p style="color:var(--tab-text)">正在验证登录凭证...</p></div>`;
      
      try {
        const res = await fetch('/api/check-cookie');
        const d = await res.json();
        if (d.ok) {
          g_userId = d.user_id;
          document.getElementById('statusDot').classList.add('ok');
          document.getElementById('statusText').textContent = t('conn_ok') + g_userId;
          showEmptyInit();
        } else {
          document.getElementById('content').innerHTML = `
            <div class="empty">
              <div class="icon" style="font-size:48px;margin-bottom:16px">⚠️</div>
              <p style="color:var(--text);font-size:15px;margin-bottom:8px"><b>验证失败</b></p>
              <p style="font-size:13px;color:var(--card-meta);margin-bottom:24px;line-height:1.6">
                ${d.msg}<br>请确保在弹出的浏览器中已成功登录后再关闭窗口。
              </p>
              <div style="display:flex;gap:12px;justify-content:center">
                <button class="btn btn-ghost" onclick="triggerAutoLogin()">🔄 重新登录</button>
                <button class="btn btn-primary" onclick="verifyAndProceed()">✅ 再次验证</button>
              </div>
            </div>`;
        }
      } catch (e) {
        document.getElementById('content').innerHTML = `
          <div class="empty">
            <div class="icon">❌</div>
            <p>网络错误: ${e.message}</p>
            <button class="btn btn-primary" style="margin:16px auto 0" onclick="verifyAndProceed()">重试</button>
          </div>`;
      }
    }

    // ====== STARTUP ======
    setTheme(currTheme);
    setLang(currLang);

    (async function () {
      try {
        const res = await fetch('/api/check-cookie');
        const data = await res.json();
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        if (data.ok) {
          g_userId = data.user_id;
          dot.classList.add('ok');
          txt.textContent = t('conn_ok') + g_userId;
        } else {
          txt.textContent = data.msg;
          showLoginPrompt();
        }
      } catch (e) {
        document.getElementById('statusText').textContent = t('conn_err');
        showLoginPrompt();
      }
    })();

    // ====== AUTO SHUTDOWN ON CLOSE ======
    window.addEventListener('unload', function() {
      navigator.sendBeacon('/api/shutdown');
    });
  </script>
</body>

</html>
